<div class="component is-3d is-pointer-events-none"
  [style.width.px]="width * gridSize" [style.height.px]="depth * gridSize"
  appMovable [movable.option]="movableOption" [movable.disable]="isLocked" (movable.ondragstart)="onMove()" (movable.ondragend)="onMoved()">
  
  <ng-container *ngIf="hasFloor && isVisibleFloor && 0 < floorImage?.url.length">
    <div *ngIf="isDropShadow && terreinAltitude != 0"
      style="opacity: 0.7; filter: brightness(0) blur(1px); transform: translateZ(0.3px) scale(0.98); backface-visibility: visible; width: 100%; height: 100%; position: absolute;"
      class="texture chrome-smooth-image-trick" [ngClass]="{'blinking-animation': !isLocked}" [style.background-image]="'url(' + floorImage.url + ')' | safe: 'style'"></div>
  </ng-container>

  <div class="is-3d" style="width: 100%; height: 100%;" [ngClass]="{fall: altitude == 0}" [ngStyle]="{'transform': 'translateZ(' + (altitude * gridSize) + 'px)'}">
    
    <div class="component-content is-3d" [ngClass]="{'is-grab': !isLocked}" [style.pointer-events]="isDragging ? 'none' : 'auto'"
      appRotable [rotable.option]="rotableOption" (rotable.ondragstart)="onMove()" (rotable.ondragend)="onMoved()" [rotable.disable]="isLocked">
      
      <ng-container *ngIf="!isLocked">
        <div class="pedestal-grab rotate-grab"></div>
        <div class="rotate-grab of-left-top rotate-grab-icon"><i class="material-icons">autorenew</i></div>
        <div class="rotate-grab of-left-bottom rotate-grab-icon"><i class="material-icons">autorenew</i></div>
        <div class="rotate-grab of-right-bottom rotate-grab-icon"><i class="material-icons">autorenew</i></div>
        <div class="rotate-grab of-right-top rotate-grab-icon"><i class="material-icons">autorenew</i></div>
      </ng-container>

      <ng-container *ngIf="hasFloor && isVisibleFloor && 0 < floorImage?.url.length">
        <div class="texture chrome-smooth-image-trick" [ngClass]="{'blinking-animation': !isLocked}" 
          [ngStyle]="{'backface-visibility': isSlope ? 'visible' : 'hidden', 'transform': 'translateZ(' + ((height / (isSlope ? 2 : 1)) * gridSize) + 'px)' + floorModCss, filter: 'brightness(' + floorBrightness + ')'}"
          [style.background-image]="'url(' + floorImage.url + ')' | safe: 'style'">
          <div *ngIf="isSelected" class="selected-highlight" [ngClass]="{'is-magnetic': isMagnetic}"></div>
        </div>
      </ng-container>

      <canvas class="grid-canvas is-fill" [ngStyle]="{'backface-visibility': isSlope ? 'visible' : 'hidden', 'transform': 'translateZ(' + ((height / (isSlope ? 2 : 1)) * gridSize) + 'px)' + floorModCss, filter: 'brightness(' + floorBrightness + ')'}" #gridCanvas></canvas>

<ng-container *ngIf="hasWall && 0 < wallImage?.url.length">
        <ng-container *ngIf="slopeDirection != slopeDirectionState.TOP">
          <div *ngIf="isVisibleWallTopBottom" [ngClass]="{'blinking-animation': !isLocked, 'no-shadow': !isSurfaceShading, 'is-slope': slopeDirection == slopeDirectionState.LEFT, 'is-inverse-slope': slopeDirection == slopeDirectionState.RIGHT}"
            class="is-3d texture of-wall-top chrome-smooth-image-trick" [style.background-image]="'url(' + wallImage.url + ')' | safe: 'style'"
            [style.width.px]="width * gridSize" [style.height.px]="height * gridSize">
            <div *ngIf="isSelected" class="selected-highlight" [ngClass]="{'is-magnetic': isMagnetic}"></div>
          </div>
        </ng-container>
        <ng-container *ngIf="slopeDirection != slopeDirectionState.BOTTOM">
          <div *ngIf="isVisibleWallTopBottom" [ngClass]="{'blinking-animation': !isLocked, 'no-shadow': !isSurfaceShading, 'is-slope': slopeDirection == slopeDirectionState.LEFT, 'is-inverse-slope': slopeDirection == slopeDirectionState.RIGHT}"
            class="is-3d texture of-wall-bottom chrome-smooth-image-trick" [style.background-image]="'url(' + wallImage.url + ')' | safe: 'style'"
            [style.width.px]="width * gridSize" [style.height.px]="height * gridSize">
            <div *ngIf="isSelected" class="selected-highlight" [ngClass]="{'is-magnetic': isMagnetic}"></div>
          </div>
        </ng-container>
        <ng-container *ngIf="slopeDirection != slopeDirectionState.LEFT">
          <div *ngIf="isVisibleWallLeftRight" [ngClass]="{'blinking-animation': !isLocked, 'no-shadow': !isSurfaceShading, 'is-slope': slopeDirection == slopeDirectionState.BOTTOM, 'is-inverse-slope': slopeDirection == slopeDirectionState.TOP}"
            class="is-3d texture of-wall-left chrome-smooth-image-trick" [style.background-image]="'url(' + wallImage.url + ')' | safe: 'style'"
            [style.width.px]="depth * gridSize" [style.height.px]="height * gridSize">
            <div *ngIf="isSelected" class="selected-highlight" [ngClass]="{'is-magnetic': isMagnetic}"></div>
          </div>
        </ng-container>
        <ng-container *ngIf="slopeDirection != slopeDirectionState.RIGHT">
          <div *ngIf="isVisibleWallLeftRight" [ngClass]="{'blinking-animation': !isLocked, 'no-shadow': !isSurfaceShading, 'is-slope': slopeDirection == slopeDirectionState.BOTTOM, 'is-inverse-slope': slopeDirection == slopeDirectionState.TOP}"
            class="is-3d texture of-wall-right chrome-smooth-image-trick" [style.background-image]="'url(' + wallImage.url + ')' | safe: 'style'"
            [style.width.px]="depth * gridSize" [style.height.px]="height * gridSize">
            <div *ngIf="isSelected" class="selected-highlight" [ngClass]="{'is-magnetic': isMagnetic}"></div>
          </div>
        </ng-container>
      </ng-container>

      <div *ngIf="isLocked" class="lock-icon is-center is-3d" style="transform: translateZ(1px);">
        <i class="material-icons" style="display: inline;">lock</i>
      </div>

    </div> </div> <div class="is-3d" *ngIf="isAltitudeIndicate && !((isSlope || isWallExist) && -height < altitude && altitude < 0) && (terreinAltitude <= -0.5 || 0.5 <= terreinAltitude)" style="display:flex; align-items: center; border-left: 2px dashed blanchedalmond; position: absolute; transform-origin: top left; pointer-events: none;"
    [style.height.px]="math.abs(terreinAltitude * gridSize)"
    [ngStyle]="{transform: 'translateX(' + (width * gridSize / 2) + 'px) translateY(' + (-depth * gridSize / 2) + 'px) rotateX(-90deg) translateY(' + (terreinAltitude > 0 ? -(altitude + ((isSlope || isWallExist) ? 0 : height)) * gridSize : 0) + 'px) rotateY(' + (viewRotateZ) + 'deg)'}">
    <div class="is-3d" style="pointer-events: none;">
      <span class="altitude-indicator is-3d" style="position: absolute; pointer-events: none;">{{ math.abs(terreinAltitude) }}</span>
      <span class="altitude-indicator is-3d" style="position: absolute; pointer-events: none; transform: rotateY(-180deg)">{{ math.abs(terreinAltitude) }}</span>
    </div>
  </div>

</div>
