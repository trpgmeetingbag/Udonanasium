<div class="tachie-image-box" [style.height.px]="tachieAreaHeight">
  <ng-container *ngFor="let pos of posArray">
    <img *ngIf="getImageUrl(pos)"
         class="tachie-image"
         [src]="getImageUrl(pos) | safe: 'resourceUrl'"
         [style.left.%]="(pos / 11) * 100"
         [style.height.px]="chatTabList.tachieHeightValue"
         (mousedown)="tachieClick(pos)"
         draggable="false" />
  </ng-container>
</div>
