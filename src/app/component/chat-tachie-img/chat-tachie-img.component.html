<div #tachieLayer class="tachie-layer">
  <div class="tachie-image-box" *ngIf="chatTab && tachieDispFlag">
    <ng-container *ngFor="let pos of posArray">
      <img *ngIf="getImageUrl(pos) && !isPosHidden(pos)"
           class="tachie-image"
           [src]="getImageUrl(pos) | safe: 'resourceUrl'"
           [style.left.%]="(pos / 11) * 100"
           [style.transform]="getTransformStyle(pos)"
           [style.height.px]="tachieHeightValue"
           [style.opacity]="activePos === -1 || activePos === pos ? 1 : 0.66"
           [style.z-index]="activePos === pos ? 100 : pos"
           (mousedown)="tachieClick(pos)"
           draggable="false" />
    </ng-container>
  </div>
</div>
